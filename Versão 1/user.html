<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acessar perfil</title>
    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="user.css">
</head>
<body>
    <div class="header-user">
        <div class="profile-img">👤</div>
        <h1>Usuário</h1>
        <p>meu.email@exemplo.com</p>
    </div>

    <div class="content">
        <div class="profile-section">
            <h2 class="titulo">Informações Pessoais</h2>
            <div class="profile-item">
                <div>
                    <label>Nome Completo</label>
                    <p class="profile-item-value">João Silva Santos</p>
                </div>
                <button class="btn-edit">Editar</button>
            </div>
            <div class="profile-item">
                <div>
                    <label>Email</label>
                    <p class="profile-item-value">meu.email@exemplo.com</p>
                </div>
                <button class="btn-edit">Editar</button>
            </div>
            <div class="profile-item">
                <div>
                    <label>Telefone</label>
                    <p class="profile-item-value">(11) 98765-4321</p>
                </div>
                <button class="btn-edit">Editar</button>
            </div>
        </div>

        <div class="profile-section">
            <h2>Assinatura</h2>
            <div class="profile-item">
                <div>
                    <label>Plano</label>
                    <p class="profile-item-value">Premium</p>
                </div>
            </div>
            <div class="profile-item">
                <div>
                    <label>Válido até</label>
                    <p class="profile-item-value">30 de Dezembro, 2026</p>
                </div>
            </div>
        </div>

        <div class="profile-section">
            <h2>Preferências</h2>
            <div class="profile-item">
                <div>
                    <label>Notificações</label>
                    <p class="profile-item-value">Ativadas</p>
                </div>
            </div>
            <div class="profile-item">
                <div>
                    <label>Tema</label>
                    <p class="profile-item-value">Escuro</p>
                </div>
                <button class="btn-edit">Trocar tema</button>
            </div>
        </div>
    </div>
</body>
</html>
